<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Админка — Новые грани</title>
  <link id="adminCustomFontStylesheet" rel="stylesheet" href="" disabled>
  <link rel="stylesheet" href="admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script><script src="../data/default-content.js"></script><script defer src="admin.js"></script>
</head>
<body>
  <section id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-card">
      <span class="login-mark">НГ</span><h1>Управление сайтом</h1><p>Войдите под учётной записью администратора Supabase.</p>
      <label>Email<input id="loginEmail" type="email" required autocomplete="username"></label>
      <label>Пароль<input id="loginPassword" type="password" required autocomplete="current-password"></label>
      <button type="submit">Войти</button><small id="loginMessage"></small>
    </form>
  </section>
  <div id="adminApp" class="admin-app" hidden>
    <aside>
      <div class="side-brand"><span>НГ</span><b>Админка</b></div>
      <nav id="adminNav">
        <button data-tab="overview" class="active">Обзор</button>
        <button data-tab="general">Основное и логотипы</button>
        <button data-tab="albums">Альбомы</button>
        <button data-tab="portfolio">Портфолио и круг</button>
        <button data-tab="process">Этапы съёмки</button>
        <button data-tab="faq">FAQ</button>
        <button data-tab="design">Дизайн и шрифты</button>
      </nav>
      <button id="logoutButton" class="logout">Выйти</button>
    </aside>
    <main>
      <header class="admin-header"><div><p>Панель управления</p><h1 id="pageTitle">Обзор</h1></div><div class="actions"><span id="saveStatus"></span><button id="resetButton" class="ghost">Сбросить форму</button><button id="saveButton">Сохранить на сайте</button></div></header>
      <div id="workspace"></div>
    </main>
  </div>
</body>
</html>
