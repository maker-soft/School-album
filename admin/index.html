<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Админка — НОВЫЕ ГРАНИ</title>
  <link id="adminCustomFontStylesheet" rel="stylesheet" href="" disabled>
  <link rel="stylesheet" href="admin.css">
  <script src="../data/content.js"></script>
  <script src="../config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="login" class="login">
  <form id="loginForm">
    <div class="logo">НГ</div>
    <p class="eyebrow">Защищённая админка</p>
    <h1>Управление сайтом</h1>
    <p>Войдите под учётной записью администратора, созданной в Supabase.</p>
    <input id="email" type="email" placeholder="Email администратора" autocomplete="username" required>
    <input id="password" type="password" placeholder="Пароль" autocomplete="current-password" required>
    <button id="loginBtn">Войти</button>
    <small id="loginStatus">Данные передаются напрямую в Supabase Auth.</small>
  </form>
</div>
<div id="panel" class="panel hidden">
  <aside>
    <a class="admin-brand" href="../"><span>НГ</span><b>НОВЫЕ ГРАНИ</b></a>
    <nav>
      <button data-tab="dashboard" class="active">Обзор</button>
      <button data-tab="brand">Основное и логотипы</button>
      <button data-tab="design">Дизайн и шрифты</button>
      <button data-tab="pages">Тексты страниц</button>
      <button data-tab="albums">Альбомы</button>
      <button data-tab="portfolio">Портфолио</button>
      <button data-tab="process">Этапы работы</button>
      <button data-tab="faq">FAQ</button>
      <button data-tab="reviews">Отзывы</button>
      <button data-tab="data">Резервная копия</button>
    </nav>
    <div class="aside-actions"><a class="view-site" href="../" target="_blank">Открыть сайт ↗</a><button id="logoutBtn" class="logout-btn">Выйти</button></div>
  </aside>
  <main>
    <header>
      <div><p class="eyebrow">Content management</p><h2 id="pageTitle">Обзор</h2></div>
      <div class="header-actions"><span id="saveStatus">Данные синхронизированы</span><button id="saveBtn" class="primary">Сохранить</button></div>
    </header>
    <section id="workspace"></section>
  </main>
</div>
<datalist id="fontPresets">
  <option value='Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'></option>
  <option value='system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'></option>
  <option value='Arial, Helvetica, sans-serif'></option>
  <option value='Verdana, Geneva, sans-serif'></option>
  <option value='"Trebuchet MS", Arial, sans-serif'></option>
  <option value='Georgia, "Times New Roman", serif'></option>
  <option value='"Times New Roman", Times, serif'></option>
  <option value='Garamond, Georgia, serif'></option>
  <option value='"Courier New", Courier, monospace'></option>
</datalist>
<script src="admin.js"></script>
</body>
</html>
