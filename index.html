<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="description" content="Премиальные школьные и выпускные фотоальбомы">
  <meta name="theme-color" content="#17211f">
  <title>Новые грани — школьные фотокниги</title>
  <link id="dynamicFavicon" rel="icon" href="assets/images/album-signature.svg">
  <link id="customFontStylesheet" rel="stylesheet" href="" disabled>
  <link rel="stylesheet" href="assets/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="data/default-content.js"></script>
  <script defer src="assets/app.js"></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#top" aria-label="На главную">
      <span class="brand-logo-slot"></span>
      <span class="brand-mark">НГ</span>
      <span class="brand-copy"><b></b><small></small></span>
    </a>
    <nav>
      <a href="#albums">Альбомы</a><a href="#portfolio">Портфолио</a><a href="#process">Как проходит съёмка</a><a href="#faq">Вопросы</a>
    </nav>
    <a class="header-cta js-vk" target="_blank" rel="noopener"></a>
    <button class="menu-toggle" aria-label="Открыть меню">☰</button>
  </header>
  <main id="top">
    <section class="hero">
      <img class="hero-image" alt="Школьная фотосъёмка">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <p class="eyebrow hero-eyebrow"></p>
        <h1><span class="hero-title"></span><em class="hero-accent"></em></h1>
        <p class="hero-text"></p>
        <a class="primary-button" href="#albums"><span class="hero-button"></span> <b>↓</b></a>
        <p class="hero-note"></p>
      </div>
    </section>

    <section id="albums" class="section albums-section">
      <header class="section-heading">
        <p class="eyebrow albums-eyebrow"></p><h2 class="albums-title"></h2><p class="albums-text"></p>
      </header>
      <div class="album-grid"></div>
    </section>

    <section id="portfolio" class="section portfolio-section">
      <div class="portfolio-heading-wrap">
        <header class="section-heading portfolio-heading">
          <p class="eyebrow portfolio-eyebrow"></p>
          <h2><span class="portfolio-title"></span><em class="portfolio-accent"></em></h2>
          <p class="portfolio-description"></p>
        </header>
        <div class="circle-badge" aria-label="Круглый информационный элемент">
          <svg viewBox="0 0 240 240" role="img">
            <defs><path id="circlePath" d="M120,120 m-91,0 a91,91 0 1,1 182,0 a91,91 0 1,1 -182,0"/></defs>
            <circle cx="120" cy="120" r="108" class="circle-fill"/>
            <text class="circle-outer"><textPath href="#circlePath" startOffset="0%"></textPath></text>
          </svg>
          <div class="circle-center"><span class="circle-top"></span><strong class="circle-main"></strong><small class="circle-bottom"></small></div>
        </div>
      </div>
      <div class="portfolio-rail"></div>
      <p class="portfolio-swipe"></p>
    </section>

    <section id="process" class="section dark-section">
      <header class="section-heading process-heading">
        <p class="eyebrow process-eyebrow"></p>
        <h2><span class="process-title"></span><em class="process-accent"></em></h2>
        <p class="process-text"></p>
      </header>
      <div class="process-grid"></div>
    </section>

    <section id="faq" class="section faq-section">
      <header class="section-heading">
        <p class="eyebrow faq-eyebrow"></p><h2 class="faq-title"></h2><p class="faq-text"></p>
      </header>
      <div class="faq-list"></div>
    </section>

    <section class="section final-cta">
      <p>Готовы обсудить альбом вашего класса?</p>
      <a class="primary-button js-vk" target="_blank" rel="noopener">Написать во ВКонтакте <b>↗</b></a>
    </section>
  </main>
  <footer>
    <div class="footer-brand"><span class="footer-logo-slot"></span><span class="brand-mark">НГ</span><span><b></b><small></small></span></div>
    <p class="footer-text"></p><a class="js-vk" target="_blank" rel="noopener">VK ↗</a>
  </footer>

  <dialog class="lightbox"><button class="lightbox-close" aria-label="Закрыть">×</button><img alt=""><p></p></dialog>
</body>
</html>
